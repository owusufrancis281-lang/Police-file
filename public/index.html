<!DOCTYPE html>
<html>
<head>
    <title>Police-file System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Police-file System</h1>
    <p>Secure Police Records Management System</p>

    <hr>

    <h2>Login</h2>

    <form id="loginForm">

    <label>Email:</label><br>
    <input type="email" id="email" placeholder="Enter Email" required><br><br>

    <label>Password:</label><br>
    <input type="password" id="password" placeholder="Enter Password" required><br><br>

    <button type="submit">Login</button>

</form>

</body>
</html>
