<!DOCTYPE html>
<html>
<head>
    <title>Police-file System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Police-file System</h1>
<p>Secure Police Records Management System</p>

<hr>

<h2>Officer Login</h2>

<form id="loginForm">

    <label>Email:</label><br>
    <input type="email" id="email" placeholder="Enter Email" required><br><br>

    <label>Password:</label><br>
    <input type="password" id="password" placeholder="Enter Password" required><br><br>

    <button type="submit">Login</button>

</form>
<br>

<p>
Don't have an account?
<a href="register.html">Register here</a>
</p>
    <br>

<p>
Want to report an incident?
<a href="public-report.html">Report Here</a>
</p>
<p id="message"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0i-UUX2LjqK19Z0rzpirEF8mTnEeH9c4",
  authDomain: "police-file.firebaseapp.com",
  projectId: "police-file",
  storageBucket: "police-file.firebasestorage.app",
  messagingSenderId: "678648437133",
  appId: "1:678648437133:web:3bf6d3d2c597549966c5c4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        await signInWithEmailAndPassword(auth, email, password);

        window.location.href = "dashboard.html";

    } catch (error) {

        document.getElementById("message").innerHTML =
        "Invalid email or password.";

    }

});

</script>

</body>
</html>
