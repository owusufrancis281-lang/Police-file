<!DOCTYPE html>
<html>

<head>
    <title>Register Case - Police-file</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Register New Case</h1>

<form>

<label>Case Number:</label><br>
<input type="text" placeholder="Enter Case Number"><br><br>

<label>Date Reported:</label><br>
<input type="date"><br><br>

<label>Location of Incident:</label><br>
<input type="text" placeholder="Enter Location"><br><br>

<label>Incident Type:</label><br>
<input type="text" placeholder="e.g. Theft, Assault, Accident"><br><br>

<label>Complainant Name:</label><br>
<input type="text" placeholder="Enter Name"><br><br>

<label>Contact Number:</label><br>
<input type="text" placeholder="Enter Contact"><br><br>

<label>Incident Description:</label><br>
<textarea placeholder="Describe the incident"></textarea>
<br><br>
<label>Attach Evidence (Images/Documents):</label><br>
<input type="file" accept="image/*,.pdf,.doc,.docx" multiple>

<br><br>
<label>Reporting Officer:</label><br>
<input type="text" placeholder="Officer Name"><br><br>

<button type="submit">Save Case</button>

</form>

</body>
</html>
