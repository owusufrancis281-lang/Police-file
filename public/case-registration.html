<!DOCTYPE html>
<html>

<head>
    <title>Register Case - Police-file</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Register New Case</h1>

<form>

<label>Case Number:</label><br>
<input type="text" id="caseNumber" placeholder="Enter Case Number"><br><br>

<label>Date Reported:</label><br>
<input type="date" id="dateReported"><br><br>

<label>Location of Incident:</label><br>
<input type="text" id="location" placeholder="Enter Location"><br><br>

<label>Incident Type:</label><br>
<input type="text" id="incidentType" placeholder="e.g. Theft, Assault, Accident"><br><br>

<label>Complainant Name:</label><br>
<input type="text" id="complainantName" placeholder="Enter Name"><br><br>

<label>Contact Number:</label><br>
<input type="text" id="contactNumber" placeholder="Enter Contact"><br><br>

<label>Incident Description:</label><br>
<textarea id="description" placeholder="Describe the incident"></textarea>
    <br>

<label>Upload Evidence (Images/Documents):</label><br>

<input type="file" id="evidence" accept="image/*,.pdf,.doc,.docx">

<br><br>

<br><br>
<label>Reporting Officer:</label><br>
<input type="text" id="officerName" placeholder="Officer Name"><br><br>

<button type="submit">Save Case</button>

</form>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getFirestore, 
collection, 
addDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0i-UUX2LjqK19Z0rzpirEF8mTnEeH9c4",
  authDomain: "police-file.firebaseapp.com",
  projectId: "police-file",
  storageBucket: "police-file.firebasestorage.app",
  messagingSenderId: "678648437133",
  appId: "1:678648437133:web:3bf6d3d2c597549966c5c4"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
    

document.querySelector("form").addEventListener("submit", async (e) => {
    e.preventDefault();
let evidenceURL = "";

const file = document.getElementById("evidence").files[0];

if(file){

const formData = new FormData();

formData.append("file", file);

formData.append("upload_preset", "policefile_upload");

const uploadResponse = await fetch(
"https://api.cloudinary.com/v1_1/crsyohqc/auto/upload",
{
method: "POST",
body: formData
}
);

const uploadData = await uploadResponse.json();

evidenceURL = uploadData.secure_url;

}    await addDoc(collection(db, "cases"), {
    caseNumber: document.getElementById("caseNumber").value,
    dateReported: document.getElementById("dateReported").value,
    location: document.getElementById("location").value,
    incidentType: document.getElementById("incidentType").value,
    complainantName: document.getElementById("complainantName").value,
    contactNumber: document.getElementById("contactNumber").value,
    description: document.getElementById("description").value,
    officerName: document.getElementById("officerName").value,
    evidence: evidenceURL,
    createdAt: new Date()
});

    alert("Case saved successfully");
});

</script>
</body>
</html>
