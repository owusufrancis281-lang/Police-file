<!DOCTYPE html>
<html>

<head>
    <title>Case Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Case Details</h1>

<div id="details">
Loading case information...
</div>

<br>
<button id="editBtn">
Edit Case
</button>

<br><br>
<button id="deleteBtn">
Delete Case
</button>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
getFirestore,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyB0i-UUX2LjqK19Z0rzpirEF8mTnEeH9c4",
  authDomain: "police-file.firebaseapp.com",
  projectId: "police-file",
  storageBucket: "police-file.firebasestorage.app",
  messagingSenderId: "678648437133",
  appId: "1:678648437133:web:3bf6d3d2c597549966c5c4"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


const id = new URLSearchParams(window.location.search).get("id");


const caseRef = doc(db, "cases", id);

const caseSnap = await getDoc(caseRef);


if(caseSnap.exists()){

let data = caseSnap.data();


document.getElementById("details").innerHTML = `

<p><b>Case Number:</b> ${data.caseNumber}</p>

<p><b>Date Reported:</b> ${data.dateReported}</p>

<p><b>Location:</b> ${data.location}</p>

<p><b>Incident Type:</b> ${data.incidentType}</p>

<p><b>Complainant:</b> ${data.complainantName}</p>

<p><b>Contact:</b> ${data.contactNumber}</p>

<p><b>Description:</b> ${data.description}</p>

<p><b>Officer:</b> ${data.officerName}</p>

`;

}else{

document.getElementById("details").innerHTML =
"Case not found";

}

import { deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


document.getElementById("deleteBtn").addEventListener("click", async () => {

    const confirmDelete = confirm("Are you sure you want to delete this case?");

    if(confirmDelete){

        await deleteDoc(doc(db, "cases", id));

        alert("Case deleted successfully");

        window.location.href = "records.html";

    }

});
   document.getElementById("editBtn").addEventListener("click", async () => {

let newLocation = prompt("Enter new location:");

let newDescription = prompt("Enter new description:");

if(newLocation && newDescription){

await updateDoc(doc(db, "cases", id), {

location: newLocation,

description: newDescription

});

alert("Case updated successfully");

location.reload();

}

}); 
</script>


</body>

</html>
