<!DOCTYPE html>
<html>

<head>
    <title>Case Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Case Details</h1>

<div id="details">
Loading case information...
</div>

<br>

<button id="deleteBtn">
Delete Case
</button>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyB0i-UUX2LjqK19Z0rzpirEF8mTnEeH9c4",
  authDomain: "police-file.firebaseapp.com",
  projectId: "police-file",
  storageBucket: "police-file.firebasestorage.app",
  messagingSenderId: "678648437133",
  appId: "1:678648437133:web:3bf6d3d2c597549966c5c4"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


const id = new URLSearchParams(window.location.search).get("id");


const caseRef = doc(db, "cases", id);

const caseSnap = await getDoc(caseRef);


if(caseSnap.exists()){

let data = caseSnap.data();


document.getElementById("details").innerHTML = `

<p><b>Case Number:</b> ${data.caseNumber}</p>

<p><b>Date Reported:</b> ${data.dateReported}</p>

<p><b>Location:</b> ${data.location}</p>

<p><b>Incident Type:</b> ${data.incidentType}</p>

<p><b>Complainant:</b> ${data.complainantName}</p>

<p><b>Contact:</b> ${data.contactNumber}</p>

<p><b>Description:</b> ${data.description}</p>

<p><b>Officer:</b> ${data.officerName}</p>

`;

}else{

document.getElementById("details").innerHTML =
"Case not found";

}


</script>


</body>

</html>
